services:
  - type: web
    name: matrix-spins
    runtime: node
    plan: free
    nodeVersion: "20"
    buildCommand: npm install --omit=dev
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ALLOWED_ORIGIN
        value: https://www.msaart.online
      - key: CRYPTO_WALLET_ADDRESS
        value: "0x5cee55FF03c247c1C2b4b9b4e732B087758CD863"
      - key: BTC_WALLET_ADDRESS
        value: "bc1qtl6rrtzcnrjycjdccm08d42u2qucu7qnz7ma0q"
      # DATABASE_URL: set manually in Render dashboard to use PostgreSQL
      # Without it, the app falls back to SQLite (casino.db) — works fine for single-instance deploys
