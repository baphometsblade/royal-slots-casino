services:
  - type: web
    name: matrix-spins
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ALLOWED_ORIGIN
        value: https://www.msaart.online
      - key: DATABASE_URL
        fromDatabase:
          name: matrix-spins-db
          property: connectionString

databases:
  - name: matrix-spins-db
    plan: free
    databaseName: matrix_spins
    user: matrix_spins
